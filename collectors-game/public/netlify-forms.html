<!DOCTYPE html>
<html>
<head><title>Netlify Forms Detection</title></head>
<body>
  <form name="register-attend" netlify>
    <input name="name" type="text" />
    <input name="email" type="email" />
    <input name="location" type="text" />
    <textarea name="message"></textarea>
    <button type="submit">Submit</button>
  </form>

  <form name="partner-interest" netlify>
    <input name="name" type="text" />

    <input name="location" type="text" />
    <input name="partner-type" type="text" />

    <button type="submit">Submit</button>
  </form>
</body>
</html>
