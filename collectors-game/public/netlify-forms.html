<!DOCTYPE html>
<html>
<head><title>Netlify Forms Detection</title></head>
<body>
  <!-- Register to Attend -->
  <form name="register-attend" data-netlify="true" hidden>
    <input name="name" type="text" />
    <input name="email" type="email" />
    <input name="location" type="text" />
    <textarea name="message"></textarea>
  </form>

  <!-- Partner Interest -->
  <form name="partner-interest" data-netlify="true" hidden>
    <input name="name" type="text" />
    <input name="organisation" type="text" />
    <input name="email" type="email" />
    <input name="location" type="text" />
    <input name="partner-type" type="text" />
    <textarea name="message"></textarea>
  </form>
</body>
</html>
