<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Background -->
  <circle cx="100" cy="100" r="95" fill="#2c1810"/>
  <circle cx="100" cy="100" r="88" fill="none" stroke="#c9a227" stroke-width="3"/>
  <!-- Stylised Benin mask / Nigerian art motif -->
  <!-- Mask face -->
  <ellipse cx="100" cy="90" rx="28" ry="38" fill="#c9a227"/>
  <!-- Eyes -->
  <ellipse cx="90" cy="82" rx="5" ry="6" fill="#2c1810"/>
  <ellipse cx="110" cy="82" rx="5" ry="6" fill="#2c1810"/>
  <!-- Nose bridge -->
  <rect x="97" y="88" width="6" height="10" rx="3" fill="#2c1810"/>
  <!-- Mouth -->
  <rect x="88" y="102" width="24" height="5" rx="2" fill="#2c1810"/>
  <!-- Crown / headdress lines -->
  <line x1="100" y1="52" x2="100" y2="62" stroke="#c9a227" stroke-width="3"/>
  <line x1="86" y1="55" x2="89" y2="64" stroke="#c9a227" stroke-width="2.5"/>
  <line x1="114" y1="55" x2="111" y2="64" stroke="#c9a227" stroke-width="2.5"/>
  <line x1="76" y1="62" x2="81" y2="69" stroke="#c9a227" stroke-width="2"/>
  <line x1="124" y1="62" x2="119" y2="69" stroke="#c9a227" stroke-width="2"/>
  <!-- Neck strands -->
  <line x1="86" y1="126" x2="82" y2="140" stroke="#c9a227" stroke-width="2"/>
  <line x1="93" y1="128" x2="91" y2="142" stroke="#c9a227" stroke-width="2"/>
  <line x1="100" y1="128" x2="100" y2="142" stroke="#c9a227" stroke-width="2"/>
  <line x1="107" y1="128" x2="109" y2="142" stroke="#c9a227" stroke-width="2"/>
  <line x1="114" y1="126" x2="118" y2="140" stroke="#c9a227" stroke-width="2"/>
  <!-- Text -->
  <text x="100" y="158" text-anchor="middle" font-family="Georgia, serif" font-size="9" font-weight="bold" fill="#c9a227">NATIONAL COMMISSION FOR</text>
  <text x="100" y="170" text-anchor="middle" font-family="Georgia, serif" font-size="9" font-weight="bold" fill="#c9a227">MUSEUMS &amp; MONUMENTS</text>
  <text x="100" y="185" text-anchor="middle" font-family="Georgia, serif" font-size="8" fill="#c9a227">NIGERIA</text>
</svg>
