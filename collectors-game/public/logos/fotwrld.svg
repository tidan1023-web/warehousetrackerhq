<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 120" width="300" height="120">
  <!-- Clean dark background -->
  <rect width="300" height="120" rx="6" fill="#0a1220"/>
  <!-- Left gold accent stripe -->
  <rect x="0" y="0" width="5" height="120" rx="2.5" fill="#c9a227"/>

  <!-- Large F lettermark -->
  <text x="24" y="82" font-family="Georgia, serif" font-size="68" font-weight="900" fill="#c9a227" letter-spacing="-2">F</text>

  <!-- Thin gold underline under F -->
  <rect x="20" y="88" width="46" height="2" rx="1" fill="#c9a227" opacity="0.5"/>

  <!-- FOTWRLD wordmark -->
  <text x="82" y="58" font-family="Georgia, serif" font-size="26" font-weight="900" fill="#ffffff" letter-spacing="5">FOTWRLD</text>

  <!-- Gold divider line -->
  <rect x="82" y="65" width="196" height="1.5" rx="0.75" fill="#c9a227" opacity="0.4"/>

  <!-- Full name -->
  <text x="82" y="80" font-family="Georgia, serif" font-size="10" fill="#c9a227" letter-spacing="2.5">FACTORIES OF THE WORLD</text>

  <!-- Tagline / location -->
  <text x="82" y="96" font-family="Georgia, serif" font-size="8.5" fill="rgba(255,255,255,0.4)" letter-spacing="1.5">KADUNA · NIGERIA</text>
</svg>
