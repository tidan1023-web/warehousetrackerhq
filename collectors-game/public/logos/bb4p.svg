  <circle cx="100" cy="100" r="95" fill="#1B2A4A"/>
  <circle cx="100" cy="100" r="88" fill="none" stroke="#c9a227" stroke-width="3"/>
  <!-- Basketball -->
  <circle cx="100" cy="90" r="36" fill="#e85d04" stroke="#111d35" stroke-width="1.5"/>
  <!-- Basketball seams -->
  <path d="M64 90 Q100 72 136 90" fill="none" stroke="#111d35" stroke-width="2"/>
  <path d="M64 90 Q100 108 136 90" fill="none" stroke="#111d35" stroke-width="2"/>
  <line x1="100" y1="54" x2="100" y2="126" stroke="#111d35" stroke-width="2"/>
  <!-- Olive branch / peace motif left -->
  <path d="M68 108 Q55 118 52 132" fill="none" stroke="#c9a227" stroke-width="2.5" stroke-linecap="round"/>
  <ellipse cx="57" cy="116" rx="6" ry="4" fill="#c9a227" transform="rotate(-30 57 116)"/>
  <ellipse cx="52" cy="126" rx="6" ry="4" fill="#c9a227" transform="rotate(-45 52 126)"/>
  <!-- Olive branch right -->
  <path d="M132 108 Q145 118 148 132" fill="none" stroke="#c9a227" stroke-width="2.5" stroke-linecap="round"/>
  <ellipse cx="143" cy="116" rx="6" ry="4" fill="#c9a227" transform="rotate(30 143 116)"/>
  <ellipse cx="148" cy="126" rx="6" ry="4" fill="#c9a227" transform="rotate(45 148 126)"/>
  <!-- Text -->
  <text x="100" y="148" text-anchor="middle" font-family="Georgia, serif" font-size="12" font-weight="bold" fill="#c9a227">BASKETBALL FOR PEACE</text>
  <text x="100" y="164" text-anchor="middle" font-family="Georgia, serif" font-size="9" fill="rgba(255,255,255,0.6)">NIGERIA</text>
</svg>
